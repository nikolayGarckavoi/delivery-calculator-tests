name: Run tests and publish Allure report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Start application
        run: |
          java -jar bin/app.jar > app.log 2>&1 &
          echo "Waiting for application (port 8080)..."
          for i in {1..20}; do
            if curl -s http://localhost:8080/ > /dev/null 2>&1; then
              echo "Application is UP after $i attempts"
              break
            fi
            sleep 3
          done
          if ! curl -s http://localhost:8080/ > /dev/null 2>&1; then
            echo "Application failed to start"
            cat app.log
            exit 1
          fi

      - name: Run tests
        run: ./mvnw test

      - name: Show application log on failure
        if: failure()
        run: |
          echo "=== Application log (if exists) ==="
          cat app.log || echo "No app.log found"
          echo "=== Test Reports ==="
          for f in target/surefire-reports/*.txt; do
            echo "--- $f ---"
            cat "$f"
          done

      - name: Verify allure-results exist
        run: |
          if [ -d target/allure-results ]; then
            echo "Allure results found:"
            ls -la target/allure-results
          else
            echo "No allure-results directory!"
            exit 1
          fi

      - name: Generate Allure report
        if: always()
        run: |
          ./mvnw allure:report
          if [ -f target/site/allure-maven-plugin/index.html ]; then
            echo "Report generated successfully."
          else
            echo "Report generation failed!"
            exit 1
          fi

      - name: Deploy report to GitHub Pages
        run: |
          cd target/site/allure-maven-plugin
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Update Allure report"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin gh-pages